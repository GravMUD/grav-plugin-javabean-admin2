name: JavaBean for Admin2
slug: javabean-admin2
type: plugin
version: 1.1.0
description: Free Admin2 theme presets — twelve cockpits, light/dark pairs, Andy switcher compatible.
icon: mug-hot
author:
  name: FutureVision Labs · Team DC
  email: chief@gravmud.site
  url: https://gravmud.site
homepage: https://javabean.gravmud.site
bugs: https://github.com/GravMUD/grav-plugin-javabean-admin2/issues
docs: https://javabean.gravmud.site
keywords: grav, admin2, admin-next, theme, javabean, presets
license: MIT
compatibility:
  grav: ['2.0']
dependencies:
  - { name: grav, version: '>=2.0.0' }
  - { name: admin2, version: '>=1.0.0' }
  - { name: api, version: '>=1.0.0' }
form:
  validation: loose
  fields:
    enabled:
      type: toggle
      label: JavaBean theming
      highlight: 1
      default: 1
      options:
        1: Enabled
        0: Disabled
      validate:
        type: bool
    active_preset:
      type: javabean-preset-picker
      label: Theme preset
      default: javabean-classic
    density:
      type: select
      label: Density
      default: comfy
      options:
        compact: Compact
        comfy: Comfy
        spacious: Spacious
    inject_menubar_links:
      type: toggle
      label: Show Team DC header icons
      highlight: 1
      default: 0
      help: Registers MUD Editor, GetGRAV!, and Mud Bazaar via the Admin2 menubar API. Does not write admin-next.yaml.
      options:
        1: Enabled
        0: Disabled
      validate:
        type: bool
    custom_css:
      type: textarea
      label: Custom CSS
      rows: 6
      placeholder: '/* scoped overrides — optional */'
